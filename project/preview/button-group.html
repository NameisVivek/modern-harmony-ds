<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #F0F0F4; font-family: 'Switzer', sans-serif; padding: 16px 18px; width: 820px; display: flex; flex-direction: column; gap: 18px; }
  .lbl { font-size: 9px; font-weight: 500; color: #8C8C8C; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .card { background: #fff; border-radius: 10px; border: 1px solid #EBEBEB; padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }

  /* ══════════════════════════════════
     BUTTON GROUP — eto-btn-group (attached)
     Buttons joined with shared borders,
     no gap, first/last rounded corners only
  ══════════════════════════════════ */
  .btn-group {
    display: inline-flex; align-items: stretch;
  }

  /* Individual button in group */
  .btn-group .btn {
    display: inline-flex; align-items: center; gap: 6px;
    height: 32px; padding: 0 14px;
    font-family: 'Switzer', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; white-space: nowrap; position: relative;
    border-radius: 0; margin-right: -1px; z-index: 1;
    transition: background 0.1s, z-index 0s;
  }
  .btn-group .btn .material-icons { font-size: 16px; }
  .btn-group .btn:hover { z-index: 2; }
  .btn-group .btn:focus-visible { z-index: 3; outline: none; box-shadow: 0 0 0 2px #fff, 0 0 0 4px #8342BB; }

  /* First/last rounded corners */
  .btn-group .btn:first-child { border-radius: 8px 0 0 8px; }
  .btn-group .btn:last-child  { border-radius: 0 8px 8px 0; margin-right: 0; }
  .btn-group .btn:only-child  { border-radius: 8px; margin-right: 0; }

  /* Default style */
  .btn-group .btn-default {
    background: #fff; color: #282828;
    border: 1px solid #DDDDE5;
    box-shadow: 0 1px 2px rgba(55,23,78,0.06);
  }
  .btn-group .btn-default:hover { background: #F0F0F4; }

  /* Active/selected item */
  .btn-group .btn-default.active {
    background: rgba(131,66,187,0.08); color: #7239A4;
    border-color: #8342BB; z-index: 2;
  }
  .btn-group .btn-default.active:hover { background: rgba(131,66,187,0.14); }

  /* Primary group */
  .btn-group .btn-primary {
    background: #8342BB;
    background-image: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 100%);
    color: #fff; border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 1px 2px rgba(55,23,78,0.2);
  }
  .btn-group .btn-primary:hover { background: #7239A4; }
  .btn-group .btn-primary.active { background: #4D3075; border-color: rgba(255,255,255,0.2); }

  /* Disabled */
  .btn-group .btn:disabled {
    background: #F0F0F4; color: #8C8C8C; cursor: not-allowed;
    border-color: #DDDDE5; box-shadow: none; z-index: 0;
  }

  /* Icon-only in group */
  .btn-group .btn-icon { padding: 0; width: 32px; justify-content: center; }

  /* Size variants */
  .btn-group.sm .btn { height: 28px; padding: 0 10px; font-size: 12px; }
  .btn-group.sm .btn:first-child { border-radius: 7px 0 0 7px; }
  .btn-group.sm .btn:last-child  { border-radius: 0 7px 7px 0; }
  .btn-group.sm .btn-icon { width: 28px; padding: 0; }
  .btn-group.sm .btn .material-icons { font-size: 14px; }

  .btn-group.lg .btn { height: 40px; padding: 0 18px; font-size: 14px; }
  .btn-group.lg .btn:first-child { border-radius: 9px 0 0 9px; }
  .btn-group.lg .btn:last-child  { border-radius: 0 9px 9px 0; }
  .btn-group.lg .btn-icon { width: 40px; padding: 0; }
  .btn-group.lg .btn .material-icons { font-size: 20px; }
</style>
</head>
<body>

  <!-- 1. TEXT LABELS -->
  <div>
    <div class="lbl">Text labels — view / filter toggle</div>
    <div class="card">
      <div class="row">
        <div class="btn-group" id="bg1">
          <button class="btn btn-default active" onclick="selectBg('bg1',this)">All</button>
          <button class="btn btn-default" onclick="selectBg('bg1',this)">Active</button>
          <button class="btn btn-default" onclick="selectBg('bg1',this)">In transit</button>
          <button class="btn btn-default" onclick="selectBg('bg1',this)">Completed</button>
        </div>
      </div>
      <div class="row">
        <div class="btn-group" id="bg2">
          <button class="btn btn-default active" onclick="selectBg('bg2',this)">List view</button>
          <button class="btn btn-default" onclick="selectBg('bg2',this)">Grid view</button>
          <button class="btn btn-default" onclick="selectBg('bg2',this)">Calendar</button>
        </div>
        <div class="btn-group" id="bg3">
          <button class="btn btn-default active" onclick="selectBg('bg3',this)">Week</button>
          <button class="btn btn-default" onclick="selectBg('bg3',this)">Month</button>
          <button class="btn btn-default" onclick="selectBg('bg3',this)">Quarter</button>
          <button class="btn btn-default" onclick="selectBg('bg3',this)">Year</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 2. ICON ONLY -->
  <div>
    <div class="lbl">Icon-only — formatting / view toggle</div>
    <div class="card">
      <div class="row">
        <div class="btn-group" id="bg4">
          <button class="btn btn-default btn-icon active" onclick="selectBg('bg4',this)" title="List view">
            <span class="material-icons">view_list</span>
          </button>
          <button class="btn btn-default btn-icon" onclick="selectBg('bg4',this)" title="Grid view">
            <span class="material-icons">grid_view</span>
          </button>
          <button class="btn btn-default btn-icon" onclick="selectBg('bg4',this)" title="Chart view">
            <span class="material-icons">bar_chart</span>
          </button>
        </div>

        <div class="btn-group" id="bg5">
          <button class="btn btn-default btn-icon" onclick="selectBg('bg5',this)" title="Align left">
            <span class="material-icons">format_align_left</span>
          </button>
          <button class="btn btn-default btn-icon active" onclick="selectBg('bg5',this)" title="Align center">
            <span class="material-icons">format_align_center</span>
          </button>
          <button class="btn btn-default btn-icon" onclick="selectBg('bg5',this)" title="Align right">
            <span class="material-icons">format_align_right</span>
          </button>
          <button class="btn btn-default btn-icon" onclick="selectBg('bg5',this)" title="Justify">
            <span class="material-icons">format_align_justify</span>
          </button>
        </div>

        <div class="btn-group" id="bg6">
          <button class="btn btn-default btn-icon" onclick="selectBg('bg6',this)" title="Bold">
            <span class="material-icons">format_bold</span>
          </button>
          <button class="btn btn-default btn-icon active" onclick="selectBg('bg6',this)" title="Italic">
            <span class="material-icons">format_italic</span>
          </button>
          <button class="btn btn-default btn-icon" onclick="selectBg('bg6',this)" title="Underline">
            <span class="material-icons">format_underlined</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 3. ICON + TEXT MIX -->
  <div>
    <div class="lbl">Icon + text</div>
    <div class="card">
      <div class="row">
        <div class="btn-group" id="bg7">
          <button class="btn btn-default active" onclick="selectBg('bg7',this)">
            <span class="material-icons">view_list</span>List
          </button>
          <button class="btn btn-default" onclick="selectBg('bg7',this)">
            <span class="material-icons">grid_view</span>Grid
          </button>
          <button class="btn btn-default" onclick="selectBg('bg7',this)">
            <span class="material-icons">calendar_today</span>Calendar
          </button>
        </div>

        <div class="btn-group" id="bg8">
          <button class="btn btn-default active" onclick="selectBg('bg8',this)">
            <span class="material-icons">trending_up</span>Demand
          </button>
          <button class="btn btn-default" onclick="selectBg('bg8',this)">
            <span class="material-icons">local_shipping</span>Supply
          </button>
          <button class="btn btn-default" onclick="selectBg('bg8',this)">
            <span class="material-icons">inventory</span>Inventory
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 4. SIZE VARIANTS -->
  <div>
    <div class="lbl">Sizes — sm / md (default) / lg</div>
    <div class="card">
      <div class="row" style="align-items:flex-end">
        <div>
          <div style="font-size:9px;color:#8C8C8C;margin-bottom:4px">Small</div>
          <div class="btn-group sm" id="bg-sm">
            <button class="btn btn-default active" onclick="selectBg('bg-sm',this)">List</button>
            <button class="btn btn-default" onclick="selectBg('bg-sm',this)">Grid</button>
            <button class="btn btn-default" onclick="selectBg('bg-sm',this)">Calendar</button>
          </div>
        </div>
        <div>
          <div style="font-size:9px;color:#8C8C8C;margin-bottom:4px">Medium (default)</div>
          <div class="btn-group" id="bg-md">
            <button class="btn btn-default active" onclick="selectBg('bg-md',this)">List</button>
            <button class="btn btn-default" onclick="selectBg('bg-md',this)">Grid</button>
            <button class="btn btn-default" onclick="selectBg('bg-md',this)">Calendar</button>
          </div>
        </div>
        <div>
          <div style="font-size:9px;color:#8C8C8C;margin-bottom:4px">Large</div>
          <div class="btn-group lg" id="bg-lg">
            <button class="btn btn-default active" onclick="selectBg('bg-lg',this)">List</button>
            <button class="btn btn-default" onclick="selectBg('bg-lg',this)">Grid</button>
            <button class="btn btn-default" onclick="selectBg('bg-lg',this)">Calendar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 5. STATES -->
  <div>
    <div class="lbl">States — default / active / disabled / mixed</div>
    <div class="card">
      <div class="row">
        <!-- All default -->
        <div class="btn-group">
          <button class="btn btn-default">Option A</button>
          <button class="btn btn-default">Option B</button>
          <button class="btn btn-default">Option C</button>
        </div>
        <!-- One active -->
        <div class="btn-group">
          <button class="btn btn-default active">Option A</button>
          <button class="btn btn-default">Option B</button>
          <button class="btn btn-default">Option C</button>
        </div>
        <!-- With disabled -->
        <div class="btn-group">
          <button class="btn btn-default active">Option A</button>
          <button class="btn btn-default">Option B</button>
          <button class="btn btn-default" disabled>Disabled</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 6. IN CONTEXT — toolbar -->
  <div>
    <div class="lbl">In context — data grid toolbar</div>
    <div style="background:#fff;border-radius:10px;border:1px solid #EBEBEB;padding:10px 14px;display:flex;align-items:center;gap:10px">
      <div class="btn-group sm" id="bg-ctx">
        <button class="btn btn-default active" onclick="selectBg('bg-ctx',this)">All orders</button>
        <button class="btn btn-default" onclick="selectBg('bg-ctx',this)">Open</button>
        <button class="btn btn-default" onclick="selectBg('bg-ctx',this)">Delayed</button>
        <button class="btn btn-default" onclick="selectBg('bg-ctx',this)">Completed</button>
      </div>
      <div style="flex:1"></div>
      <div class="btn-group sm" id="bg-view">
        <button class="btn btn-default btn-icon active" onclick="selectBg('bg-view',this)" title="List"><span class="material-icons">view_list</span></button>
        <button class="btn btn-default btn-icon" onclick="selectBg('bg-view',this)" title="Grid"><span class="material-icons">grid_view</span></button>
      </div>
      <span style="font-size:11px;color:#8C8C8C">12,847 records</span>
    </div>
  </div>

<script>
function selectBg(groupId, btn) {
  if (btn.disabled) return;
  document.querySelectorAll('#' + groupId + ' .btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
</script>
</body>
</html>
