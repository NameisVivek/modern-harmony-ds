<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #F0F0F4; font-family: 'Switzer', sans-serif; padding: 0; width: 900px; }

  /* ══════════════════════════════════════
     APP HEADER — dark
  ══════════════════════════════════════ */
  .app-header {
    height: 52px; background: #282828; display: flex; align-items: center;
    padding: 0 20px; gap: 0; position: relative; z-index: 10;
  }

  /* leo logo */
  .ah-logo { display: flex; align-items: center; margin-right: 24px; flex-shrink: 0; }
  .ah-logo-text {
    font-family: 'Switzer', sans-serif; font-size: 18px; font-weight: 700;
    color: #fff; letter-spacing: -0.02em;
  }
  .ah-logo-text sup { font-size: 9px; font-weight: 400; vertical-align: super; }

  /* Nav items */
  .ah-nav { display: flex; align-items: center; gap: 2px; flex: 1; }
  .ah-nav-item {
    display: flex; align-items: center; gap: 6px;
    height: 36px; padding: 0 14px; border-radius: 8px;
    font-family: 'Switzer', sans-serif; font-size: 14px; font-weight: 400;
    color: rgba(255,255,255,0.65); cursor: pointer; border: none;
    background: transparent; transition: background 0.1s, color 0.1s;
    white-space: nowrap;
  }
  .ah-nav-item:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
  .ah-nav-item.active {
    background: rgba(255,255,255,0.12); color: #fff; font-weight: 500;
  }
  .ah-nav-item .material-icons { font-size: 16px; transition: transform 0.2s; }
  .ah-nav-item.open .material-icons { transform: rotate(180deg); }

  /* Avatar */
  .ah-avatar {
    width: 34px; height: 34px; border-radius: 50%; background: #8342BB;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Switzer', sans-serif; font-size: 12px; font-weight: 600; color: #fff;
    margin-left: auto; flex-shrink: 0; cursor: pointer;
  }

  /* ══════════════════════════════════════
     MEGANAV FLYOUT — eto-meganav
  ══════════════════════════════════════ */
  .meganav-flyout {
    background: #fff; border-bottom: 1px solid #EBEBEB;
    box-shadow: 0 8px 32px rgba(20,16,41,0.12), 0 2px 8px rgba(20,16,41,0.06);
    padding: 28px 28px 32px;
    display: none; /* shown via JS */
    position: relative; z-index: 5;
  }
  .meganav-flyout.open { display: block; }

  /* Grid: featured | planning | execution */
  .mn-grid {
    display: grid;
    grid-template-columns: 240px 1fr 1fr;
    gap: 32px;
    max-width: 860px;
  }

  /* ── Featured card ── */
  .mn-featured {
    background: #282828; border-radius: 16px;
    padding: 22px 20px; display: flex; flex-direction: column; gap: 14px;
  }
  .mn-feat-label {
    font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.45);
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .mn-feat-title {
    font-size: 20px; font-weight: 600; color: #fff; line-height: 1.3;
  }
  .mn-feat-body {
    font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.55;
  }
  .mn-feat-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: #C0B4E8;
    cursor: pointer; text-decoration: none; margin-top: 4px;
    transition: color 0.1s;
  }
  .mn-feat-link:hover { color: #fff; }
  .mn-feat-link .material-icons { font-size: 16px; }

  /* ── Column ── */
  .mn-col-header {
    font-size: 10px; font-weight: 600; color: #8C8C8C;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding-bottom: 10px; border-bottom: 1px solid #EBEBEB; margin-bottom: 4px;
  }

  /* ── Nav item ── */
  .mn-item {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 10px; border-radius: 10px; cursor: pointer;
    transition: background 0.1s; text-decoration: none; border: none;
    background: transparent; width: 100%; text-align: left;
  }
  .mn-item:hover { background: #F8F8FB; }
  .mn-item.active { background: rgba(131,66,187,0.07); }

  /* Icon badge */
  .mn-icon {
    width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .mn-icon .material-icons { font-size: 20px; }

  /* Text */
  .mn-text {}
  .mn-label {
    font-size: 14px; font-weight: 500; color: #282828; line-height: 1.3;
  }
  .mn-item.active .mn-label { color: #7239A4; }
  .mn-desc {
    font-size: 12px; color: #8C8C8C; margin-top: 2px; line-height: 1.4;
  }

  /* Page area below meganav */
  .page-area {
    background: #F0F0F4; padding: 24px 20px;
    font-size: 12px; color: #8C8C8C; min-height: 120px;
    display: flex; align-items: flex-start; gap: 8px;
  }
  .hint { background: rgba(131,66,187,0.08); border-radius: 6px; padding: 8px 12px; font-size: 11px; color: #7239A4; font-weight: 500; }
</style>
</head>
<body>

  <!-- ═════════════════════════
       APP HEADER
  ═════════════════════════ -->
  <div class="app-header">
    <div class="ah-logo"><img src="../assets/logo-leo.png" alt="leo" style="height:40px;width:auto;background:#fff;border-radius:6px;padding:2px 6px;"></div>

    <div class="ah-nav">
      <button class="ah-nav-item" onclick="closeMeganav()">Dashboard</button>
      <button class="ah-nav-item active open" id="supplyBtn" onclick="toggleMeganav()">
        Supply chain
        <span class="material-icons">expand_more</span>
      </button>
      <button class="ah-nav-item" onclick="closeMeganav()">
        Analytics
        <span class="material-icons">expand_more</span>
      </button>
      <button class="ah-nav-item" onclick="closeMeganav()">Settings</button>
    </div>

    <div class="ah-avatar">JD</div>
  </div>

  <!-- ═════════════════════════
       MEGANAV FLYOUT
  ═════════════════════════ -->
  <div class="meganav-flyout open" id="meganavFlyout">
    <div class="mn-grid">

      <!-- Featured -->
      <div class="mn-featured">
        <div class="mn-feat-label">Featured</div>
        <div class="mn-feat-title">AI-powered demand forecasting</div>
        <div class="mn-feat-body">Get AI-generated demand signals with confidence bands for Q1 2025.</div>
        <a class="mn-feat-link" href="#">Explore now <span class="material-icons">arrow_forward</span></a>
      </div>

      <!-- Planning -->
      <div>
        <div class="mn-col-header">Planning</div>

        <button class="mn-item active" onclick="selectItem(this)">
          <div class="mn-icon" style="background:rgba(131,66,187,0.12)">
            <span class="material-icons" style="color:#8342BB">bar_chart</span>
          </div>
          <div class="mn-text">
            <div class="mn-label">S&amp;OP Planning</div>
            <div class="mn-desc">Demand and supply balancing</div>
          </div>
        </button>

        <button class="mn-item" onclick="selectItem(this)">
          <div class="mn-icon" style="background:#EBF4FE">
            <span class="material-icons" style="color:#1376D8">calendar_today</span>
          </div>
          <div class="mn-text">
            <div class="mn-label">Forecast</div>
            <div class="mn-desc">Demand signals and scenarios</div>
          </div>
        </button>

        <button class="mn-item" onclick="selectItem(this)">
          <div class="mn-icon" style="background:#E8FAF2">
            <span class="material-icons" style="color:#027B44">inventory_2</span>
          </div>
          <div class="mn-text">
            <div class="mn-label">Inventory</div>
            <div class="mn-desc">Stock levels and replenishment</div>
          </div>
        </button>
      </div>

      <!-- Execution -->
      <div>
        <div class="mn-col-header">Execution</div>

        <button class="mn-item" onclick="selectItem(this)">
          <div class="mn-icon" style="background:#FEF7F4">
            <span class="material-icons" style="color:#B02530">local_shipping</span>
          </div>
          <div class="mn-text">
            <div class="mn-label">Shipments</div>
            <div class="mn-desc">Track and manage deliveries</div>
          </div>
        </button>

        <button class="mn-item" onclick="selectItem(this)">
          <div class="mn-icon" style="background:#F0F0F4">
            <span class="material-icons" style="color:#5E5C75">list_alt</span>
          </div>
          <div class="mn-text">
            <div class="mn-label">Orders</div>
            <div class="mn-desc">Purchase and sales orders</div>
          </div>
        </button>

        <button class="mn-item" onclick="selectItem(this)">
          <div class="mn-icon" style="background:#FFFAEB">
            <span class="material-icons" style="color:#C47A00">rule</span>
          </div>
          <div class="mn-text">
            <div class="mn-label">Trade compliance</div>
            <div class="mn-desc">Regulations and documentation</div>
          </div>
        </button>
      </div>

    </div>
  </div>

  <!-- Page content below -->
  <div class="page-area">
    <span class="hint">↑ Click "Supply chain" to toggle the meganav open/closed</span>
  </div>

<script>
function toggleMeganav() {
  const flyout = document.getElementById('meganavFlyout');
  const btn    = document.getElementById('supplyBtn');
  const isOpen = flyout.classList.contains('open');
  flyout.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
}

function closeMeganav() {
  document.getElementById('meganavFlyout').classList.remove('open');
  document.getElementById('supplyBtn').classList.remove('open');
}

function selectItem(item) {
  document.querySelectorAll('.mn-item').forEach(i => i.classList.remove('active'));
  item.classList.add('active');
}

// Close on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMeganav(); });
</script>
</body>
</html>
