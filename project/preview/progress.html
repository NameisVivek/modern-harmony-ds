<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: 'Switzer', sans-serif; padding: 14px 16px; width: 700px; display: flex; flex-direction: column; gap: 14px; }
  .lbl { font-size: 9px; font-weight: 500; color: #8C8C8C; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .row { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
  .divider { height: 1px; background: #F0F0F4; }

  /* ── Linear progress bar ── */
  .progress-bar-wrap { display: flex; flex-direction: column; gap: 4px; }
  .progress-track {
    height: 6px; background: #F0F0F4; border-radius: 3px; overflow: hidden; width: 100%;
  }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s ease; }
  .progress-fill-violet  { background: #8342BB; }
  .progress-fill-success { background: #5BD6A0; }
  .progress-fill-error   { background: #E02F3A; }
  .progress-fill-warning { background: #FDBF14; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 11px; color: #767676; }

  /* ── Circular spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2.5px solid #F0F0F4; border-top-color: #8342BB;
    animation: spin 0.7s linear infinite; flex-shrink: 0;
  }
  .spinner-sm { width: 16px; height: 16px; border-width: 2px; }
  .spinner-lg { width: 32px; height: 32px; border-width: 3px; }
  .spinner-success { border-top-color: #5BD6A0; }
  .spinner-error   { border-top-color: #E02F3A; }

  /* ── Loading dots ── */
  @keyframes pulse { 0%,80%,100% { transform:scale(.6);opacity:.5 } 40% { transform:scale(1);opacity:1 } }
  .dots { display: flex; gap: 4px; align-items: center; }
  .dot-item { width: 6px; height: 6px; border-radius: 50%; background: #8342BB; animation: pulse 1.2s ease-in-out infinite; }
  .dot-item:nth-child(2) { animation-delay: 0.2s; }
  .dot-item:nth-child(3) { animation-delay: 0.4s; }

  /* ── Skeleton ── */
  @keyframes shimmer { 0% { background-position: -400px 0 } 100% { background-position: 400px 0 } }
  .skeleton {
    border-radius: 4px; height: 12px;
    background: linear-gradient(90deg, #F0F0F4 25%, #E5E5EC 50%, #F0F0F4 75%);
    background-size: 400px 100%;
    animation: shimmer 1.4s ease-in-out infinite;
  }
  .skeleton-text { margin-bottom: 6px; }

  /* Skeleton card */
  .skel-card { border: 1px solid #EBEBEB; border-radius: 10px; padding: 12px; width: 180px; }
</style>
</head>
<body>
  <div>
    <div class="lbl">Linear progress bar</div>
    <div style="display:flex; flex-direction:column; gap:10px; max-width:500px">
      <div class="progress-bar-wrap">
        <div class="progress-meta"><span>Upload progress</span><span>68%</span></div>
        <div class="progress-track"><div class="progress-fill progress-fill-violet" style="width:68%"></div></div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-meta"><span>S&amp;OP cycle completion</span><span>100%</span></div>
        <div class="progress-track"><div class="progress-fill progress-fill-success" style="width:100%"></div></div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-meta"><span>Error rate</span><span>34%</span></div>
        <div class="progress-track"><div class="progress-fill progress-fill-error" style="width:34%"></div></div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-meta"><span>Forecast accuracy</span><span>72%</span></div>
        <div class="progress-track"><div class="progress-fill progress-fill-warning" style="width:72%"></div></div>
      </div>
      <!-- Indeterminate -->
      <div class="progress-bar-wrap">
        <div class="progress-meta"><span>Processing…</span></div>
        <div class="progress-track" style="overflow:hidden;position:relative">
          <div class="progress-fill progress-fill-violet" style="width:40%;animation:indeterminate 1.4s ease-in-out infinite"></div>
        </div>
      </div>
    </div>
  </div>
  <style>
    @keyframes indeterminate { 0% { width:20%;margin-left:-20% } 50% { width:60%;margin-left:40% } 100% { width:20%;margin-left:110% } }
  </style>

  <div class="divider"></div>

  <div>
    <div class="lbl">Spinners &amp; loading dots</div>
    <div class="row">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="spinner spinner-sm"></div>
        <span style="font-size:12px;color:#767676">Small</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="spinner"></div>
        <span style="font-size:12px;color:#767676">Default</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="spinner spinner-lg"></div>
        <span style="font-size:12px;color:#767676">Large</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="spinner spinner-success"></div>
        <span style="font-size:12px;color:#27854D">Success</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="spinner spinner-error"></div>
        <span style="font-size:12px;color:#9A112C">Error</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;background:#282828;padding:6px 10px;border-radius:6px">
        <div class="spinner" style="border-color:rgba(255,255,255,0.2);border-top-color:#fff"></div>
        <span style="font-size:12px;color:rgba(255,255,255,0.7)">On dark</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="dots">
          <div class="dot-item"></div>
          <div class="dot-item"></div>
          <div class="dot-item"></div>
        </div>
        <span style="font-size:12px;color:#767676">Dots</span>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="lbl">Skeleton loaders</div>
    <div class="row" style="align-items:flex-start">
      <div class="skel-card">
        <div class="skeleton skeleton-text" style="width:60%;height:10px"></div>
        <div class="skeleton skeleton-text" style="width:100%;height:24px;margin-bottom:8px;border-radius:4px"></div>
        <div class="skeleton skeleton-text" style="width:80%"></div>
        <div class="skeleton" style="width:50%;margin-top:6px"></div>
      </div>
      <div class="skel-card">
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <div class="skeleton" style="width:32px;height:32px;border-radius:8px;flex-shrink:0"></div>
          <div style="flex:1">
            <div class="skeleton skeleton-text" style="width:80%"></div>
            <div class="skeleton" style="width:50%;height:10px"></div>
          </div>
        </div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text" style="width:90%"></div>
        <div class="skeleton" style="width:70%"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;width:220px">
        <div style="display:flex;gap:8px;align-items:center">
          <div class="skeleton" style="width:40px;height:40px;border-radius:8px;flex-shrink:0"></div>
          <div style="flex:1"><div class="skeleton skeleton-text"></div><div class="skeleton" style="width:60%;height:10px"></div></div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <div class="skeleton" style="width:40px;height:40px;border-radius:8px;flex-shrink:0"></div>
          <div style="flex:1"><div class="skeleton skeleton-text"></div><div class="skeleton" style="width:45%;height:10px"></div></div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <div class="skeleton" style="width:40px;height:40px;border-radius:8px;flex-shrink:0"></div>
          <div style="flex:1"><div class="skeleton skeleton-text" style="width:75%"></div><div class="skeleton" style="width:55%;height:10px"></div></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
